<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Hati ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #05000a; min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; color: white;
        }

        /* --- GALAXY STARS --- */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle linear infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* --- MESSAGE BOX --- */
        .content-box {
            max-width: 600px; width: 90%; text-align: center; position: relative; z-index: 10;
        }

        .affirmation-text {
            font-family: 'Caveat', cursive; font-size: 38px; line-height: 1.4;
            color: #ffd1df; text-shadow: 0 0 15px rgba(255, 179, 223, 0.5);
            min-height: 200px;
        }

        .btn-next {
            margin-top: 50px; background: rgba(255,255,255,0.1);
            border: 1px solid #ff4d6d; color: #ff4d6d; padding: 10px 30px;
            border-radius: 30px; cursor: pointer; transition: 0.3s;
        }
        .btn-next:hover { background: #ff4d6d; color: white; box-shadow: 0 0 20px #ff4d6d; }

        .progress-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.1); margin: 20px auto; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #ff4d6d; width: 0%; transition: 0.5s; }

        .btn-back { position: fixed; bottom: 30px; opacity: 0.3; text-decoration: none; color: white; font-size: 12px; }
    </style>
</head>
<body>

    <div id="star-field"></div>

    <div class="content-box">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="affirmation-text" id="text-display">Sentuh tombol di bawah untuk melihat isi hatiku...</div>
        <button class="btn-next" id="btn-action" onclick="nextMessage()">Buka Pesan ✨</button>
    </div>

    <a href="index.html#menu" class="btn-back">🏠 Selesai & Kembali</a>

    <script>
        const messages = [
            "Hai bidadari tercantikku, Fifi...",
            "Aku cuma mau kamu tahu, kamu itu lebih dari sekadar cukup.",
            "Terima kasih sudah lahir ke dunia dan membagi senyummu denganku.",
            "Di hari spesialmu ini, aku berharap kamu selalu merasa dicintai.",
            "Karena bagiku, kamu adalah melodi paling tenang di dunia yang bising ini.",
            "Jangan pernah ragukan dirimu ya sayang?",
            "Kamu berharga, kamu hebat, dan kamu adalah segalanya buat aku.",
            "I love you, now and always. ❤️"
        ];

        let currentIndex = 0;

        function nextMessage() {
            const textEl = document.getElementById('text-display');
            const progressEl = document.getElementById('progress');
            const btn = document.getElementById('btn-action');

            if (currentIndex < messages.length) {
                // Efek Fade Out
                textEl.style.opacity = '0';
                textEl.style.transform = 'translateY(10px)';

                setTimeout(() => {
                    textEl.innerText = messages[currentIndex];
                    textEl.style.opacity = '1';
                    textEl.style.transform = 'translateY(0)';
                    
                    currentIndex++;
                    progressEl.style.width = (currentIndex / messages.length * 100) + '%';
                    
                    if(currentIndex === messages.length) {
                        btn.innerText = "Peluk Dari Jauh 🤗";
                    } else {
                        btn.innerText = "Lanjut... ✨";
                    }
                }, 500);
            } else {
                alert("Semoga pesan kecil ini bikin hari kamu makin indah ya sayang! I Love You! ❤️");
            }
        }

        // Generate Stars
        const starField = document.getElementById('star-field');
        for(let i=0; i<100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            starField.appendChild(star);
        }
    </script>
</body>
</html>
