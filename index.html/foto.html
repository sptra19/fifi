<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fifi Alya Sa'dliani ❤️</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #2b0202;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%238c1c38' fill-opacity='0.25' fill-rule='evenodd'/%3E%3C/svg%3E");
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; margin: 0;
            perspective: 2500px;
        }

        .bg-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%); z-index: -2; }

        /* --- EFEK BINTANG MAGIS --- */
        .sparkles-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .sparkle { position: absolute; width: 4px; height: 4px; background: #ffb3c6; border-radius: 50%; box-shadow: 0 0 12px 3px rgba(255, 179, 198, 0.8); animation: floatUp linear infinite, twinkle ease-in-out infinite; opacity: 0; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); } 100% { transform: translateY(-10vh) scale(1.2); } }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* --- BUKU XL SIMETRIS (DENGAN ANIMASI TERBANG/MENGHILANG) --- */
        .book-container { 
            width: 95vw; max-width: 900px; height: 80vh; max-height: 650px; 
            position: relative; transform-style: preserve-3d; 
            box-shadow: 0 0 100px rgba(255, 77, 109, 0.15); border-radius: 20px;
            /* Transisi untuk efek buku terbang menghilang */
            transition: transform 2.5s cubic-bezier(0.5, 0, 0.2, 1), opacity 2s ease;
        }
        .book-container.fly-away {
            transform: translateY(-80vh) rotate(-10deg) scale(0.6);
            opacity: 0;
            pointer-events: none;
        }

        .book { 
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d; 
            transform: translateX(0); 
            /* Transisi buku bergeser ke tengah saat ditutup */
            transition: transform 3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .page {
            position: absolute; width: 50%; height: 100%; top: 0; right: 0; 
            transform-origin: left center; transform-style: preserve-3d;
            transition: transform 3s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 3px 18px 18px 3px; 
            box-shadow: 8px 15px 35px rgba(0,0,0,0.6);
            will-change: transform; 
        }

        .page.flipped { transform: rotateY(-180deg); box-shadow: -8px 15px 35px rgba(0,0,0,0.6); }

        .front, .back {
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; border-radius: inherit; background-color: #fffdf5; 
            border: 1px solid #ebd9c8;
        }

        .front::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 50px; background: linear-gradient(to right, rgba(0,0,0,0.15), transparent); pointer-events: none; z-index: 10; }
        .back::before { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 50px; background: linear-gradient(to left, rgba(0,0,0,0.15), transparent); pointer-events: none; z-index: 10; }

        .back { transform: rotateY(180deg); border-radius: 18px 3px 3px 18px; }

        .cover { background: linear-gradient(145deg, #4a091a, #2b0202) !important; border: 2px solid #d4af37 !important; }
        .cover-front { border-left: 15px solid #240101 !important; }
        .cover-back { border-right: 15px solid #240101 !important; }

        .cover-title {
            font-family: 'Dancing Script', cursive; font-size: 65px;
            background: linear-gradient(to right, #ffb3c6, #fff, #ffb3c6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; line-height: 1.1; font-weight: bold;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.6));
        }

        /* --- FOTO SUPER BESAR & POLAROID ESTETIK --- */
        .photo-frame {
            background: #fff; padding: 15px 15px 45px 15px;
            box-shadow: 4px 8px 25px rgba(0,0,0,0.15); border-radius: 4px;
            width: 95%; max-width: 380px; 
            text-align: center; transform: rotate(-1deg);
            position: relative;
        }
        .photo-frame::after {
            content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(2deg);
            width: 100px; height: 25px; background: rgba(255, 179, 198, 0.6); backdrop-filter: blur(2px);
            border-left: 2px dashed rgba(255,255,255,0.5); border-right: 2px dashed rgba(255,255,255,0.5);
            box-shadow: 1px 2px 5px rgba(0,0,0,0.1);
        }

        .photo-wrapper { width: 100%; height: 380px; overflow: hidden; margin-bottom: 20px; background: #eee; border-radius: 2px; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; transition: transform 7s ease-out; }
        .page.flipped .back img, .page:not(.flipped) .front img { transform: scale(1.12); }

        .photo-caption { font-family: 'Caveat', cursive; font-size: 38px; color: #8c1c38; font-weight: bold; line-height: 1; }

        /* --- TOMBOL KILAU --- */
        .btn-pulse {
            background: linear-gradient(135deg, #ff4d6d, #8c1c38); color: white; padding: 15px 45px;
            border-radius: 50px; font-weight: 600; font-size: 20px; letter-spacing: 1px;
            animation: pulseGlow 2.5s infinite; box-shadow: 0 0 25px rgba(255, 77, 109, 0.5);
            border: 2px solid #ffb3c6; cursor: pointer; text-decoration: none; display: inline-block;
            text-align: center; transition: 0.3s;
        }
        .btn-pulse:hover { filter: brightness(1.2); }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 77, 109, 0.5); } 50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 77, 109, 0.9); } }

        /* --- LAYAR OVERLAY (AWAL DAN AKHIR) --- */
        .full-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 1.5s ease; backdrop-filter: blur(6px); 
        }
        
        #end-screen { opacity: 0; pointer-events: none; }
        #end-screen.show { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="Lauv - I Like Me Better [Official Audio].mp3" type="audio/mpeg">
    </audio>

    <div class="sparkles-container" id="sparkles"></div>
    <div class="bg-overlay"></div>

    <div class="full-overlay" id="start-screen" onclick="startStory()">
        <div class="btn-pulse mb-6">MANUSIA PALING INDAH ✨</div>
        <p class="text-pink-200 font-['Poppins'] text-sm tracking-widest px-6 text-center leading-relaxed font-light">
            (Pastikan volume suara hp menyala yah sayang ku) <br>
        </p>
    </div>

    <div class="book-container" id="book-container">
        <div class="book" id="book"></div>
    </div>

    <div class="full-overlay" id="end-screen">
        <h2 class="text-5xl font-[Dancing Script] text-[#ffb3c6] mb-10 text-center drop-shadow-lg leading-snug">Sudah selesai sayang ku,<br> hari ini kamu cantik sekali</h2>
        <div class="flex flex-col gap-6 w-full max-w-xs">
            <button class="btn-pulse w-full" onclick="resetBook()" style="background: white; color: #8c1c38; border: 2px solid #ff4d6d; text-shadow: none;">🔄 Lihat Lagi?</button>
            <a href="index.html#menu" class="btn-pulse w-full">🏠 HADIA LAINYA AJA SAYANG</a>
        </div>
    </div>

    <script>
        // =========================================================================
        // ✏️ UBAH KATA-KATA & FOTO DI BAWAH INI SESUAI KEINGINAN KAMU ✏️
        // =========================================================================

        const teksCoverJudul    = "ALBUM TERMANIS <br>Princess"; 
        const teksCoverSubJudul = "Fifi Alya Sa'dliani"; 
        const teksHalamanPembuka = "Untuk Fifi Sayang..."; 
        const teksHalamanPenutup1 = "I Love You Forever ❤️"; 
        const teksHalamanPenutup2 = "SELAMAT ULANG TAHUN SAYANG KU, ! 🎉"; 

        const fotos = [
            { src: "1.jpeg", text: "Cantiknya princess ❤️" },
            { src: "2.jpeg", text: "manisnya " },
            { src: "3.jpeg", text: "tiram bakar ku" },
            { src: "4.jpeg", text: "INI KAMU CANTIK BANGET" },
            { src: "5.jpeg", text: "KALAU INI JELAS MI" },
            { src: "6.jpeg", text: "lucu banget ceweku" },
            { src: "7.jpeg", text: "LUAR BIASA" },
            { src: "8.jpeg", text: "kayak beda orang tapi cantik" },
            { src: "9.jpeg", text: "ini lucu banget sayang" },
            { src: "10.jpeg", text: "kayak ada palembannya" },
            { src: "11.jpeg", text: "ini ada barru barrunya" },
            { src: "12.jpeg", text: "masa depanku banget mi" },
            { src: "13.jpeg", text: "cieee 21 mi" },
            { src: "14.jpeg", text: "Terima kasihh yaaa" },
            { src: "15.jpeg", text: "I Love You Fifi 🌸" }
        ];

        // =========================================================================
        // LOGIKA KODE (TIDAK ADA GLITCH!)
        // =========================================================================

        const book = document.getElementById('book');
        const totalPages = Math.ceil(fotos.length / 2) + 2;

        function getPhotoHTML(index) {
            if(index >= fotos.length) return `<h2 class="text-6xl font-[Dancing Script] text-[#d81159] text-center px-4 leading-tight">${teksHalamanPenutup1}</h2>`;
            return `
                <div class="photo-frame">
                    <div class="photo-wrapper"><img src="${fotos[index].src}" alt="Fifi"></div>
                    <p class="photo-caption">${fotos[index].text}</p>
                </div>
            `;
        }

        let html = '';
        
        // Cover Depan
        html += `
            <div class="page" id="p1" style="z-index: ${totalPages}">
                <div class="front cover cover-front">
                    <h1 class="cover-title mt-10">${teksCoverJudul}</h1>
                    <div class="mt-8 px-6 py-2 bg-[#d81159] rounded-full shadow-lg border border-[#ffb3c6]">
                        <p class="font-['Poppins'] font-bold text-white tracking-widest text-sm uppercase">${teksCoverSubJudul}</p>
                    </div>
                </div>
                <div class="back">
                    <h2 class="text-5xl font-[Caveat] text-[#8c1c38] text-center px-6 leading-relaxed">${teksHalamanPembuka}</h2>
                </div>
            </div>
        `;

        // Halaman Isi
        let fIndex = 0;
        for(let i=2; i<totalPages; i++) {
            html += `
                <div class="page" id="p${i}" style="z-index: ${totalPages - i + 1}">
                    <div class="front">${getPhotoHTML(fIndex++)}</div>
                    <div class="back">${getPhotoHTML(fIndex++)}</div>
                </div>
            `;
        }

        // Halaman Akhir
        html += `
            <div class="page" id="p${totalPages}" style="z-index: 1">
                <div class="front">
                    <h2 class="text-5xl font-[Dancing Script] text-[#8c1c38] text-center leading-tight">${teksHalamanPenutup2}</h2>
                </div>
                <div class="back cover cover-back"></div>
            </div>
        `;
        
        book.innerHTML = html;

        function createSparkles() {
            const container = document.getElementById('sparkles');
            for(let i=0; i<40; i++) {
                let sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.animationDuration = (Math.random() * 5 + 5) + 's, ' + (Math.random() * 2 + 1) + 's';
                sparkle.style.animationDelay = (Math.random() * 5) + 's, ' + (Math.random() * 2) + 's';
                container.appendChild(sparkle);
            }
        }
        createSparkles();

        // LOGIKA AUDIO FADE OUT
        function fadeOutAudio() {
            const audio = document.getElementById('bg-music');
            let volume = audio.volume;
            const fadeInterval = setInterval(() => {
                if (volume > 0.05) {
                    volume -= 0.05;
                    audio.volume = volume;
                } else {
                    audio.volume = 0;
                    audio.pause();
                    clearInterval(fadeInterval);
                }
            }, 150); 
        }

        let currentPage = 1;
        let storyInterval;

        function startStory() {
            const audio = document.getElementById('bg-music');
            audio.volume = 1;
            audio.play().catch(e => console.log(e));

            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; }, 1000);
            
            storyInterval = setInterval(() => {
                if (currentPage <= totalPages) {
                    const p = document.getElementById(`p${currentPage}`);
                    p.classList.add('flipped');
                    
                    // JIKA HALAMAN TERAKHIR DITUTUP: Geser buku ke tengah agar simetris persis
                    if (currentPage === totalPages) {
                        document.getElementById('book').style.transform = 'translateX(25%)';
                    }

                    setTimeout(() => { p.style.zIndex = currentPage; }, 1500);
                    currentPage++;
                } else {
                    clearInterval(storyInterval);
                    
                    // TERBANGKAN BUKU & MENGHILANG
                    const bookCont = document.getElementById('book-container');
                    bookCont.classList.add('fly-away');
                    
                    fadeOutAudio();

                    // TAMPILKAN MENU AKHIR YANG MIRIP MENU AWAL
                    setTimeout(() => {
                        document.getElementById('end-screen').classList.add('show');
                    }, 2000);
                }
            }, 5500); 
        }

        // Fungsi Restart Buku Tanpa Glitch Animasi Balik
        function resetBook() {
            document.getElementById('end-screen').classList.remove('show');
            
            const bookCont = document.getElementById('book-container');
            const bookEl = document.getElementById('book');

            // Matikan transisi sementara agar bisa reset posisi secara instan (0 detik)
            bookCont.style.transition = 'none';
            bookEl.style.transition = 'none';
            
            bookCont.classList.remove('fly-away');
            bookEl.style.transform = 'translateX(0)';

            // Tutup semua halaman instan
            for(let i=1; i<=totalPages; i++) {
                const p = document.getElementById(`p${i}`);
                p.style.transition = 'none';
                p.classList.remove('flipped');
                p.style.zIndex = totalPages - i + 1;
            }

            // Paksa browser membaca reset instan sebelum menyalakan animasi lagi
            void bookCont.offsetWidth; 

            // Kembalikan semua aturan transisi asli
            bookCont.style.transition = '';
            bookEl.style.transition = 'transform 3s cubic-bezier(0.25, 1, 0.5, 1)';
            for(let i=1; i<=totalPages; i++) {
                document.getElementById(`p${i}`).style.transition = '';
            }
            
            currentPage = 1;
            
            // Berikan jeda 1 detik lalu mulai buka buku lagi
            setTimeout(() => {
                startStory();
            }, 1000);
        }
    </script>
</body>
</html>
