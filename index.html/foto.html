<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Spesial Fifi ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Background Gelap Estetik */
            background: url('https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?q=80&w=1920&auto=format&fit=crop') center center / cover no-repeat fixed;
            background-color: #1a0f14;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 5, 10, 0.75);
            backdrop-filter: blur(4px);
            z-index: -1;
        }

        /* --- LAYAR MULAI OTOMATIS --- */
        .start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
            cursor: pointer;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff4d6d, #8c1c38);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 600;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.5);
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 77, 109, 0.5); } 50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 77, 109, 0.8); } }

        /* --- MENU AKHIR (ULANGI / KEMBALI) --- */
        .end-menu {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 15px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease, transform 1s ease;
            transform: translateY(20px);
            z-index: 1000;
        }
        .end-menu.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .btn-end {
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-repeat { background: white; color: #8c1c38; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .btn-repeat:hover { background: #ffe3e8; transform: translateY(-3px); }
        .btn-home { background: #8c1c38; color: white; box-shadow: 0 5px 15px rgba(140, 28, 56, 0.4); border: 1px solid #ff4d6d; }
        .btn-home:hover { background: #d81159; transform: translateY(-3px); }

        /* --- BUKU 3D MURNI CSS (TANPA GLITCH) --- */
        .book-container {
            position: relative;
            width: 90vw;
            max-width: 420px;
            height: 75vh;
            max-height: 600px;
            perspective: 2000px; /* Sudut pandang 3D */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* Buku digeser sedikit ke kanan agar saat dibuka posisinya pas di tengah */
            transform: translateX(25%);
            transition: transform 1s ease;
        }
        .book.started { transform: translateX(50%); } /* Di HP */
        @media (min-width: 768px) { .book.started { transform: translateX(25%); } }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            /* Transisi super mulus seperti album tebal */
            transition: transform 2.5s cubic-bezier(0.64, 0.04, 0.35, 1);
            border-radius: 5px 15px 15px 5px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1), 5px 5px 15px rgba(0,0,0,0.3);
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: inherit;
            background-color: #fffaf0; /* Kertas Krem */
            overflow: hidden;
        }

        .back {
            transform: rotateY(180deg);
            border-radius: 15px 5px 5px 15px; /* Radius terbalik untuk halaman kiri */
        }

        /* Cover Depan & Belakang */
        .cover {
            background-color: #5c1224 !important;
            border: 2px solid #ffb3c6;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 10px) !important;
        }

        /* --- DESAIN ISI --- */
        .cover-title { font-family: 'Dancing Script', cursive; font-size: 55px; color: #ffb3c6; text-align: center; line-height: 1.1; margin-bottom: 15px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .cover-subtitle { font-family: 'Caveat', cursive; color: #5c1224; font-size: 24px; background: #ffb3c6; padding: 5px 20px; border-radius: 20px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }

        .photo-frame {
            background-color: #fff;
            padding: 12px 12px 30px 12px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.1);
            border-radius: 2px;
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #eee;
            position: relative;
        }

        .washi-tape {
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%) rotate(-4deg);
            width: 90px; height: 25px; backdrop-filter: blur(2px); z-index: 10;
        }

        .photo-wrapper {
            width: 100%;
            height: 280px;
            overflow: hidden; /* Agar foto zoom tidak keluar batas frame */
            border-radius: 2px;
            margin-bottom: 10px;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #eee;
            /* Transisi Zoom Mulus */
            transition: transform 6s ease-out;
            transform: scale(1);
        }

        /* Efek Slow Zoom hanya berjalan saat halaman terbuka */
        .page.flipped .back .photo-frame img,
        .page:not(.flipped) .front .photo-frame img {
            transform: scale(1.1);
        }

        .photo-caption { font-family: 'Caveat', cursive; font-size: 30px; color: #8c1c38; text-align: center; line-height: 1.1; }
        .sticker { position: absolute; font-size: 35px; opacity: 0.8; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.15)); z-index: 1; }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="start-overlay" id="start-overlay" onclick="startAutoPlay()">
        <div class="start-btn">Buka Hadiah ✨</div>
        <p class="text-pink-200 mt-4 font-['Poppins'] text-sm text-center px-4 font-light">Buku akan membalik halaman secara otomatis dengan mulus.</p>
    </div>

    <div class="book-container">
        <div class="book" id="book">
            </div>
    </div>

    <div class="end-menu" id="end-menu">
        <button class="btn-end btn-repeat" onclick="resetBook()">🔄 Ulangi Cerita</button>
        <a href="index.html" class="btn-end btn-home">🏠 Kembali ke Menu</a>
    </div>

    <script>
        // =========================================================
        // DATA FOTO (FIFI) - Pastikan nama file sesuai!
        // =========================================================
        const dataFotoFifi = [
            { src: "1.JPEG", caption: "Senyum manismu ❤️" },
            { src: "2.JPEG", caption: "Cantiknya paripurna" },
            { src: "3.JPEG", caption: "Duniaku" },
            { src: "4.JPEG", caption: "Bidadari tanpa sayap" },
            { src: "5.JPEG", caption: "Selalu mempesona" },
            { src: "6.JPEG", caption: "Caption Foto 6" },
            { src: "7.JPEG", caption: "Caption Foto 7" },
            { src: "8.JPEG", caption: "Caption Foto 8" },
            { src: "9.JPEG", caption: "Caption Foto 9" },
            { src: "10.JPEG", caption: "Caption Foto 10" },
            { src: "11.JPEG", caption: "Caption Foto 11" },
            { src: "12.JPEG", caption: "Caption Foto 12" },
            { src: "13.JPEG", caption: "Caption Foto 13" },
            { src: "14.JPEG", caption: "Caption Foto 14" },
            { src: "15.JPEG", caption: "Selamanya milikku 🌸" }
        ];

        const washiColors = ['rgba(255, 182, 193, 0.8)', 'rgba(255, 204, 213, 0.8)', 'rgba(255, 192, 203, 0.8)'];
        const stickers = ['🌸', '✨', '💖', '🦋', '🌷'];

        const book = document.getElementById('book');
        let pagesArray = [];

        // FUNGSI MEMBUAT KONTEN FOTO
        function createPhotoPage(fotoIndex) {
            if(fotoIndex >= dataFotoFifi.length) {
                // Jika foto habis, tampilkan ucapan penutup
                return `
                    <div class="sticker" style="top: 20%; left: 20%; font-size: 60px;">🧸</div>
                    <h2 class="text-5xl font-[Dancing Script] text-[#d81159] mb-4 text-center">I Love You,<br>Fifi 💖</h2>
                    <p class="font-[Caveat] text-3xl text-gray-600 text-center">Happy Birthday Cintaku!</p>
                `;
            }
            
            let foto = dataFotoFifi[fotoIndex];
            const frameRot = (Math.random() * 4 - 2).toFixed(1); 
            const washi = washiColors[Math.floor(Math.random() * washiColors.length)];
            const stiker = stickers[Math.floor(Math.random() * stickers.length)];

            return `
                <div class="sticker" style="top: ${10+Math.random()*15}%; left: ${10+Math.random()*70}%;">${stiker}</div>
                <div class="photo-frame" style="transform: rotate(${frameRot}deg);">
                    <div class="washi-tape" style="background: ${washi}; border-left: 2px dashed #fff; border-right: 2px dashed #fff;"></div>
                    <div class="photo-wrapper">
                        <img src="${foto.src}" alt="Foto Fifi">
                    </div>
                    <p class="photo-caption">${foto.caption}</p>
                </div>
            `;
        }

        // --- MERAKIT BUKU ---
        // Karena 1 lembar (page) punya Front dan Back, kita gabung 2 konten per lembar.
        // Halaman 1 (Cover Depan & Intro)
        book.innerHTML += `
            <div class="page" id="page-0">
                <div class="front cover">
                    <h1 class="cover-title">Scrapbook<br>Fifi</h1>
                    <p class="cover-subtitle">Penuh Cinta ❤️</p>
                    <div class="sticker" style="top: 20px; right: 20px; font-size: 40px; transform: rotate(15deg);">✨</div>
                </div>
                <div class="back">
                    <h2 class="text-3xl font-[Caveat] text-[#d81159] text-center">Hello Beautiful...</h2>
                    <p class="font-['Poppins'] text-center text-sm text-gray-600 mt-2">Duduk manis ya. Biar aku yang buka lembaran ceritanya untukmu.</p>
                </div>
            </div>
        `;

        // Halaman Isi (15 Foto berarti butuh 8 lembar sisa)
        let fotoCounter = 0;
        let pageIndex = 1;
        while(fotoCounter < 15) {
            let frontHTML = createPhotoPage(fotoCounter); fotoCounter++;
            let backHTML = createPhotoPage(fotoCounter); fotoCounter++;

            book.innerHTML += `
                <div class="page" id="page-${pageIndex}">
                    <div class="front">${frontHTML}</div>
                    <div class="back">${backHTML}</div>
                </div>
            `;
            pageIndex++;
        }

        // Cover Belakang
        book.innerHTML += `
            <div class="page" id="page-${pageIndex}">
                <div class="front"></div>
                <div class="back cover">
                    <div class="sticker" style="bottom: 20px; right: 20px; font-size: 40px;">🌸</div>
                </div>
            </div>
        `;

        // Atur Z-Index (Halaman pertama harus di tumpukan paling atas)
        const pages = document.querySelectorAll('.page');
        const totalPages = pages.length;
        pages.forEach((page, i) => {
            page.style.zIndex = totalPages - i;
        });

        // =========================================================
        // LOGIKA AUTO-PLAY & KONTROL BUKU
        // =========================================================
        let currentPage = 0;
        let autoPlayInterval;
        let isPlaying = false;

        function startAutoPlay() {
            if (isPlaying) return;
            isPlaying = true;

            // Tutup Layar Mulai
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 800);
            
            document.getElementById('book').classList.add('started');

            // Buka cover otomatis
            setTimeout(flipNextPage, 1000);

            // Ganti halaman setiap 4.5 Detik
            autoPlayInterval = setInterval(() => {
                if (currentPage < totalPages) {
                    flipNextPage();
                }
            }, 4500); 
        }

        function flipNextPage() {
            if (currentPage < totalPages) {
                const page = document.getElementById(`page-${currentPage}`);
                page.classList.add('flipped');
                // Ubah z-index agar halaman pindah ke tumpukan belakang dengan rapi
                page.style.zIndex = currentPage;
                currentPage++;

                // Jika sudah sampai halaman terakhir, hentikan dan munculkan tombol
                if (currentPage === totalPages) {
                    clearInterval(autoPlayInterval);
                    setTimeout(() => {
                        document.getElementById('end-menu').classList.add('show');
                    }, 2500); // Muncul setelah animasi lembar terakhir selesai
                }
            }
        }

        // FUNGSI ULANGI CERITA
        function resetBook() {
            document.getElementById('end-menu').classList.remove('show');
            isPlaying = false;
            
            // Tutup semua halaman dari belakang ke depan
            for(let i = totalPages - 1; i >= 0; i--) {
                const page = document.getElementById(`page-${i}`);
                page.classList.remove('flipped');
                page.style.zIndex = totalPages - i;
            }
            currentPage = 0;

            // Mulai lagi setelah buku tertutup sempurna (3 detik)
            setTimeout(() => {
                startAutoPlay();
            }, 3000);
        }

    </script>
</body>
</html>
